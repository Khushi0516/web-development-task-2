<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Calculator Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>✨ Interactive JavaScript Project ✨</h1>
        <p class="subtitle">Level 1 - Task 2</p>

        <!-- 1. Color Change Button -->
        <div class="card">
            <h2>🎨 Color Change Button</h2>
            <p>Click the button to change its color and text.</p>
            <button id="colorBtn" onclick="changeColor()">Click to Change Color</button>
        </div>

        <!-- 2. Greeting Alert -->
        <div class="card">
            <h2>⏰ Time-Based Greeting</h2>
            <p>Click to see a greeting based on current time.</p>
            <button onclick="showGreeting()">Show Greeting</button>
            <h3 id="greetingText"></h3>
        </div>

        <!-- 3. Advanced Calculator -->
        <div class="card">
            <h2>🧮 Smart Calculator</h2>
            <p>Perform basic calculations easily.</p>

            <input type="number" id="num1" placeholder="Enter first number">
            <input type="number" id="num2" placeholder="Enter second number">

            <div class="calc-buttons">
                <button onclick="calculate('+')">+</button>
                <button onclick="calculate('-')">−</button>
                <button onclick="calculate('*')">×</button>
                <button onclick="calculate('/')">÷</button>
            </div>

            <button class="clear-btn" onclick="clearCalculator()">Clear</button>

            <div class="result-box">
                <h3 id="result">Result: </h3>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
